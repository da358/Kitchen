<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Kitchen — Mini-game Testbed v12</title>
<style>
:root{--bg:#F7F5F2;--surface:#FFF;--border:#E2DDD7;--text:#1A1814;--text-2:#6B6560;--text-3:#9E9890;--accent:#5C6E5B;--font:'Inter',-apple-system,sans-serif;--radius:10px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);padding:28px 20px 80px;-webkit-user-select:none;user-select:none}
h1{font-size:22px;font-weight:700;margin-bottom:2px}
.sub{color:var(--text-2);font-size:13px;margin-bottom:8px}
.sec{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);margin:28px 0 12px;border-bottom:1px solid var(--border);padding-bottom:6px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;display:flex;flex-direction:column;gap:10px}
.ch{display:flex;align-items:center;gap:10px}.ci{font-size:26px}.ct{font-size:15px;font-weight:700}.cs{font-size:11px;color:var(--text-2);margin-top:1px}
.cn{font-size:11px;color:var(--text-3);background:var(--bg);border-radius:6px;padding:7px 9px;line-height:1.5}
canvas{border:1.5px solid var(--border);border-radius:8px;display:block;touch-action:none;background:#FAFAF8}
.pr{display:flex;align-items:center;gap:8px}.pt{flex:1;height:8px;background:var(--bg);border-radius:99px;overflow:hidden;border:1px solid var(--border)}
.pf{height:100%;border-radius:99px;background:var(--accent);width:0%;transition:width .12s ease}.pf.done{background:#4a9e4a}
.pp{font-size:11px;color:var(--text-2);min-width:34px;text-align:right}
.ft{display:flex;align-items:center;justify-content:space-between;gap:8px}.st{font-size:12px;color:var(--text-2);flex:1}
.dc{display:none;background:#EAF2EA;color:var(--accent);font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;white-space:nowrap}.dc.show{display:inline-block}
.btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);cursor:pointer;font-size:12px;font-weight:600;font-family:var(--font);background:var(--bg);color:var(--text-2);white-space:nowrap}.btn:hover{background:var(--border)}
</style>
</head>
<body>
<h1>🍳 Mini-game Testbed v12</h1>
<p class="sub">v12: Slicing fixed (9 cuts, narrower spacing, looser angle). Renamed activities.</p>
<div class="sec">Seasoning family</div><div class="grid" id="gs"></div>
<div class="sec">Spreading family — Butter &amp; Oil</div><div class="grid" id="gsp"></div>
<div class="sec">Chopping</div><div class="grid" id="gchop"></div>
<div class="sec">Whisking</div><div class="grid" id="gwhisk"></div>
<div class="sec">Food Processor</div><div class="grid" id="gfp2"></div>
<div class="sec">Dough</div><div class="grid" id="gdough"></div>
<div class="sec">Mortar &amp; Pestle</div><div class="grid" id="gm"></div>

<script>
/* ── SHARED ───────────────────────────────────────────────── */
function ep(e,c){const r=c.getBoundingClientRect(),s=e.touches?e.touches[0]:e.changedTouches?e.changedTouches[0]:e;return{x:s.clientX-r.left,y:s.clientY-r.top};}
const _pi=[];
const _ro=new ResizeObserver(entries=>{for(const en of entries){const c=en.target,r=c.getBoundingClientRect();if(r.width<4||r.height<4)continue;const i=_pi.findIndex(p=>p.cvs===c);if(i===-1)continue;const{fn}=_pi.splice(i,1)[0];_ro.unobserve(c);fn();}});
function whenReady(id,fn){const c=document.getElementById("c-"+id);if(!c)return;const r=c.getBoundingClientRect();if(r.width>4&&r.height>4)fn();else{_pi.push({cvs:c,fn});_ro.observe(c);}}
function IC(id){const c=document.getElementById("c-"+id),dpr=window.devicePixelRatio||1;const r=c.getBoundingClientRect(),W=r.width||320,H=r.height||190;c.width=W*dpr;c.height=H*dpr;const ctx=c.getContext("2d");ctx.scale(dpr,dpr);return{cvs:c,ctx,W,H};}
function OS(W,H){const c=document.createElement("canvas");c.width=Math.round(W);c.height=Math.round(H);return{c,ctx:c.getContext("2d")};}
function addCard(gid,{id,icon,title,sub,notes,H=200}){
  const d=document.createElement("div");d.className="card";
  d.innerHTML=`<div class="ch"><span class="ci">${icon}</span><div><div class="ct">${title}</div><div class="cs">${sub}</div></div></div>
<canvas id="c-${id}" style="width:100%;height:${H}px"></canvas>
<div class="pr"><div class="pt"><div class="pf" id="pf-${id}"></div></div><div class="pp" id="pp-${id}">0%</div></div>
<div class="ft"><div class="st" id="st-${id}">Ready</div><span class="dc" id="dc-${id}">✓ Done!</span><button class="btn" id="rb-${id}">Reset</button></div>
${notes?`<div class="cn">💡 ${notes}</div>`:""}`;
  document.getElementById(gid).appendChild(d);
}
function SP(id,pct,lbl){const f=document.getElementById("pf-"+id);f.style.width=Math.min(100,pct)+"%";if(lbl!==undefined)document.getElementById("pp-"+id).textContent=lbl;if(pct>=100){f.classList.add("done");document.getElementById("dc-"+id).classList.add("show");document.getElementById("st-"+id).style.display="none";}}
function SS(id,msg){const e=document.getElementById("st-"+id);if(e)e.textContent=msg;}
function RB(id,fn){document.getElementById("rb-"+id).onclick=fn;}
function resetCard(id){document.getElementById("pf-"+id).classList.remove("done");document.getElementById("dc-"+id).classList.remove("show");document.getElementById("st-"+id).style.display="";}

// Draw a stylized platter/dish on a canvas context
// cx,cy = center; rx,ry = radii; ctx = canvas context
function drawPlatter(ctx,cx,cy,rx,ry){
  // Outer rim — slightly darker
  ctx.fillStyle="#C8B89A";
  ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);ctx.fill();
  // Inner dish surface — warm cream
  ctx.fillStyle="#EDE4D0";
  ctx.beginPath();ctx.ellipse(cx,cy,rx*0.88,ry*0.82,0,0,Math.PI*2);ctx.fill();
  // Subtle inner shadow ring
  const sg=ctx.createRadialGradient(cx,cy,rx*0.55,cx,cy,rx*0.88);
  sg.addColorStop(0,"rgba(0,0,0,0)");sg.addColorStop(1,"rgba(0,0,0,0.055)");
  ctx.fillStyle=sg;ctx.beginPath();ctx.ellipse(cx,cy,rx*0.88,ry*0.82,0,0,Math.PI*2);ctx.fill();
  // Rim highlight
  ctx.strokeStyle="rgba(255,255,255,0.45)";ctx.lineWidth=1.5;
  ctx.beginPath();ctx.ellipse(cx,cy-ry*0.08,rx*0.78,ry*0.2,0,Math.PI,Math.PI*2);ctx.stroke();
}


/* ══════════════════════════════════════════════════════════════
   S1 — SHAKE & SEASON
   Stylized canvas platter. 2D coverage grid so late-game
   progress is as steady as early-game.
══════════════════════════════════════════════════════════════ */
(function(){
  const ID="s1";
  addCard("gs",{id:ID,icon:"🫙",H:220,title:"Shake & Season",sub:"Drag the jar to season the platter",
    notes:"Canvas-drawn platter (no emoji). 2D grid coverage: each cell capped so covering new areas always beats re-covering old ones. Progress stays steady throughout."});

  // 2D grid: GCOLS × GROWS cells. Each cell saturates at 1.0.
  // Progress = avg saturation across all in-dish cells.
  const GCOLS=14,GROWS=6,TARGET=0.72,CLR="#C84020";
  let g,off,jarX,jarVel,jarTgt,isDrag,lastX,grid,gridMask,done,_raf,shower;

  const dCX=W=>W*0.5, dCY=H=>H*0.73, dRX=W=>W*0.42, dRY=H=>H*0.13;

  function init(){
    g=IC(ID);off=OS(g.W,g.H);
    jarX=g.W/2;jarVel=0;jarTgt=jarX;isDrag=false;lastX=jarX;
    grid=new Float32Array(GCOLS*GROWS).fill(0);
    // Pre-compute which grid cells are inside the dish ellipse
    gridMask=new Uint8Array(GCOLS*GROWS).fill(0);
    for(let r=0;r<GROWS;r++)for(let c=0;c<GCOLS;c++){
      const cx2=(c+0.5)/GCOLS*2-1, cy2=(r+0.5)/GROWS*2-1;
      if(cx2*cx2+cy2*cy2<0.88)gridMask[r*GCOLS+c]=1;
    }
    done=false;shower=[];
    resetCard(ID);off.ctx.clearRect(0,0,g.W,g.H);
    SP(ID,0,"0%");SS(ID,"Drag the jar left and right to season");
    if(_raf)cancelAnimationFrame(_raf);tick();
  }

  function spawnShower(x,speed){
    const count=Math.min(4,Math.floor(Math.abs(speed)*0.6+1));
    for(let i=0;i<count;i++){
      shower.push({x:x+(Math.random()-.5)*8,y:g.H*0.17,
        vx:(Math.random()-.5)*1.0+speed*0.025,vy:Math.random()*0.8+0.5,
        life:1,r:0.5+Math.random()*0.9});
    }
  }

  function landAt(jarAboveX){
    const{W,H}=g;
    // Sample a random point inside the full dish ellipse
    const angle=Math.random()*Math.PI*2;
    const rad=Math.sqrt(Math.random());
    const lx=dCX(W)+dRX(W)*rad*Math.cos(angle)*0.86;
    const ly=dCY(H)+dRY(H)*rad*Math.sin(angle)*0.80;
    const bx=lx+(jarAboveX-dCX(W))*0.18;
    const ex=(bx-dCX(W))/dRX(W),ey=(ly-dCY(H))/dRY(H);
    if(ex*ex+ey*ey>0.88)return;

    // Draw tiny irregular particle
    off.ctx.save();off.ctx.translate(bx,ly);off.ctx.rotate(Math.random()*Math.PI);
    off.ctx.fillStyle=CLR;off.ctx.globalAlpha=0.30+Math.random()*0.32;
    off.ctx.beginPath();off.ctx.ellipse(0,0,0.6+Math.random()*1.1,0.35+Math.random()*0.7,0,0,Math.PI*2);off.ctx.fill();
    off.ctx.restore();

    // Find 2D grid cell — capped at 1.0 per cell to prevent saturation bonus
    const gc=Math.floor(((bx-(dCX(W)-dRX(W)))/(dRX(W)*2))*GCOLS);
    const gr=Math.floor(((ly-(dCY(H)-dRY(H)))/(dRY(H)*2))*GROWS);
    const idx=gr*GCOLS+gc;
    if(gc>=0&&gc<GCOLS&&gr>=0&&gr<GROWS&&gridMask[idx]){
      grid[idx]=Math.min(1,grid[idx]+0.055);
    }
    // Progress = sum of all masked cells / total possible
    let total=0,sum=0;
    for(let i=0;i<GCOLS*GROWS;i++){if(gridMask[i]){total++;sum+=grid[i];}}
    const tc=total?sum/total:0;
    const pct=Math.min(100,Math.round(tc/TARGET*100));
    SP(ID,pct,pct+"%");
    if(tc>=TARGET){done=true;SP(ID,100,"100%");}
    else SS(ID,"Keep going — cover the whole platter");
  }

  function tick(){
    const{ctx,W,H}=g;ctx.clearRect(0,0,W,H);

    // Canvas platter
    drawPlatter(ctx,dCX(W),dCY(H),dRX(W),dRY(H));
    ctx.drawImage(off.c,0,0,W,H);

    // Coverage grid dots — clipped to dish ellipse
    ctx.save();ctx.beginPath();ctx.ellipse(dCX(W),dCY(H),dRX(W)*0.86,dRY(H)*0.78,0,0,Math.PI*2);ctx.clip();
    const cellW=dRX(W)*2/GCOLS,cellH=dRY(H)*2/GROWS;
    for(let r=0;r<GROWS;r++)for(let c=0;c<GCOLS;c++){
      const idx=r*GCOLS+c;if(!gridMask[idx])continue;
      const cx2=dCX(W)-dRX(W)+c*cellW+cellW/2;
      const cy2=dCY(H)-dRY(H)+r*cellH+cellH/2;
      ctx.fillStyle=grid[idx]>0.35?"rgba(92,110,91,0.60)":"rgba(200,190,180,0.30)";
      ctx.beginPath();ctx.arc(cx2,cy2,1.8,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();

    // Jar
    jarVel+=(jarTgt-jarX)*0.2;jarVel*=0.72;jarX+=jarVel;
    const tilt=jarVel*0.028,jiggle=Math.sin(Date.now()/60)*Math.abs(jarVel)*0.012;
    ctx.save();ctx.translate(jarX,H*0.11);ctx.rotate(tilt+jiggle);
    ctx.fillStyle="#F5ECD7";ctx.strokeStyle="#D4A853";ctx.lineWidth=1.5;
    ctx.beginPath();ctx.roundRect(-15,-30,30,52,7);ctx.fill();ctx.stroke();
    ctx.fillStyle=CLR;ctx.globalAlpha=0.75;ctx.beginPath();ctx.roundRect(-13,-2,26,16,3);ctx.fill();ctx.globalAlpha=1;
    ctx.fillStyle="#7A6040";ctx.beginPath();ctx.roundRect(-14,-37,28,11,4);ctx.fill();
    for(let h=-6;h<=6;h+=6){ctx.fillStyle="rgba(0,0,0,0.3)";ctx.beginPath();ctx.arc(h,-32,2,0,Math.PI*2);ctx.fill();}
    ctx.restore();

    // Cascade
    const dishTopY=dCY(H)-dRY(H);
    for(let i=shower.length-1;i>=0;i--){
      const p=shower[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.07;p.life-=0.013;
      if(p.y>=dishTopY){landAt(jarX);shower.splice(i,1);continue;}
      if(p.life<=0){shower.splice(i,1);continue;}
      const df=Math.max(0,(dishTopY-p.y)/(dishTopY-g.H*0.18));
      ctx.globalAlpha=p.life*df*0.75;ctx.fillStyle=CLR;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;

    if(isDrag&&!done&&Math.abs(jarVel)>1.0)spawnShower(jarX,jarVel);
    if(!isDrag&&!done&&Math.abs(jarVel)>0.35&&Math.random()<0.08)spawnShower(jarX,jarVel*0.4);
    if(!done)_raf=requestAnimationFrame(tick);
  }

  function onStart(e){if(done)return;e.preventDefault();isDrag=true;lastX=ep(e,g.cvs).x;}
  function onMove(e){if(!isDrag||done)return;e.preventDefault();const x=ep(e,g.cvs).x,dx=x-lastX;jarTgt=Math.max(35,Math.min(g.W-35,jarTgt+dx*0.9));jarVel+=dx*0.55;lastX=x;}
  function onEnd(){isDrag=false;}
  whenReady(ID,()=>{const c=document.getElementById("c-"+ID);c.addEventListener("mousedown",onStart);document.addEventListener("mousemove",onMove);document.addEventListener("mouseup",onEnd);c.addEventListener("touchstart",onStart,{passive:false});c.addEventListener("touchmove",onMove,{passive:false});c.addEventListener("touchend",onEnd);RB(ID,init);init();});
})();


/* ══════════════════════════════════════════════════════════════
   S2 — PEPPER GRINDER (unchanged — kept for reference)
══════════════════════════════════════════════════════════════ */
(function(){
  const ID="s2";
  addCard("gs",{id:ID,icon:"🌶️",H:215,title:"Pepper Grinder",sub:"Drag in a circle around the mill",
    notes:"Unchanged from v4 — working well. Canvas platter (no emoji) added to food below."});
  const TICKS_NEEDED=32;
  let g,off,handle,ticks,done,isDown,bursts,_raf;
  const MCX=W=>W*0.5,mY=H=>H*0.33,plateY=H=>H*0.84;

  function init(){
    g=IC(ID);off=OS(g.W,g.H);handle={angle:0,last:null,acc:0};ticks=0;done=false;isDown=false;bursts=[];
    resetCard(ID);off.ctx.clearRect(0,0,g.W,g.H);
    SP(ID,0,`0/${TICKS_NEEDED}`);SS(ID,"Drag in circles around the mill to grind");
    if(_raf)cancelAnimationFrame(_raf);tick2();
  }
  function doTick(speed){
    ticks++;const{W,H}=g,mcx=MCX(W),MY=mY(H);
    const count=Math.min(8,Math.floor(speed*4+3));
    for(let i=0;i<count;i++)bursts.push({x:mcx+(Math.random()-.5)*8,y:MY+62,vx:(Math.random()-.5)*2.5,vy:Math.random()*1.4+0.5,r:1.0+Math.random()*1.5,life:1});
    for(let i=0;i<4;i++){
      const lx=mcx+(Math.random()-.5)*W*0.44,ly=plateY(g.H)-g.H*0.02+(Math.random()-.5)*g.H*0.04;
      off.ctx.beginPath();off.ctx.arc(lx,ly,0.8+Math.random()*1.4,0,Math.PI*2);
      const v=28+Math.floor(Math.random()*22);off.ctx.fillStyle=`rgb(${v},${v-8},${v-12})`;off.ctx.fill();
    }
    const pct2=Math.round(ticks/TICKS_NEEDED*100);
    SP(ID,pct2,pct2+"%");
    if(ticks>=TICKS_NEEDED){done=true;SP(ID,100,"100%");}
    else SS(ID,`${TICKS_NEEDED-ticks} quarter-turns left`);
  }
  function tick2(){
    const{ctx,W,H}=g;ctx.clearRect(0,0,W,H);
    const mcx=MCX(W),MY=mY(H),PY=plateY(H);
    // Canvas platter below grinder
    drawPlatter(ctx,mcx,PY,W*0.32,H*0.065);
    ctx.drawImage(off.c,0,0,W,H);
    bursts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life-=0.018;
      const nearPlate=Math.max(0,Math.min(1,(p.y-(PY-18))/18));
      const alpha=Math.max(0,p.life)*(1-nearPlate*0.9);
      if(p.y>=PY){p.life=0;return;}
      ctx.globalAlpha=alpha;ctx.fillStyle="#2A1A08";ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    });
    bursts=bursts.filter(p=>p.life>0);ctx.globalAlpha=1;
    ctx.fillStyle="#5A4030";ctx.beginPath();ctx.moveTo(mcx-18,MY+18);ctx.lineTo(mcx+18,MY+18);ctx.lineTo(mcx+13,MY+60);ctx.lineTo(mcx-13,MY+60);ctx.closePath();ctx.fill();
    ctx.fillStyle="#8B6040";ctx.beginPath();ctx.roundRect(mcx-16,MY-22,32,42,4);ctx.fill();
    ctx.strokeStyle="rgba(0,0,0,0.12)";ctx.lineWidth=1;
    for(let i=-3;i<=3;i++){ctx.beginPath();ctx.moveTo(mcx-16,MY-22+i*14);ctx.lineTo(mcx+16,MY-22+i*14);ctx.stroke();}
    ctx.fillStyle="#4A3020";ctx.beginPath();ctx.ellipse(mcx,MY-22,16,6,0,0,Math.PI*2);ctx.fill();
    ctx.save();ctx.translate(mcx,MY-22);ctx.rotate(handle.angle);
    ctx.fillStyle="#3A2010";ctx.beginPath();ctx.roundRect(-18,-3,36,6,3);ctx.fill();
    [-18,18].forEach(hx=>{ctx.fillStyle="#6A4828";ctx.beginPath();ctx.arc(hx,0,5,0,Math.PI*2);ctx.fill();});
    ctx.restore();
    if(!done)_raf=requestAnimationFrame(tick2);
  }
  function onStart(e){if(done)return;e.preventDefault();isDown=true;const p=ep(e,g.cvs);handle.last=Math.atan2(p.y-mY(g.H),p.x-MCX(g.W));handle.acc=0;}
  function onMove(e){if(!isDown||done)return;e.preventDefault();const p=ep(e,g.cvs),a=Math.atan2(p.y-mY(g.H),p.x-MCX(g.W));if(handle.last!==null){let da=a-handle.last;if(da>Math.PI)da-=Math.PI*2;if(da<-Math.PI)da+=Math.PI*2;handle.angle+=da;handle.acc+=da;while(Math.abs(handle.acc)>=Math.PI/2){handle.acc-=Math.sign(handle.acc)*Math.PI/2;doTick(Math.abs(da)*8);}}handle.last=a;}
  function onEnd(){isDown=false;handle.last=null;}
  whenReady(ID,()=>{const c=document.getElementById("c-"+ID);c.addEventListener("mousedown",onStart);document.addEventListener("mousemove",onMove);document.addEventListener("mouseup",onEnd);c.addEventListener("touchstart",onStart,{passive:false});c.addEventListener("touchmove",onMove,{passive:false});c.addEventListener("touchend",onEnd);RB(ID,init);init();});
})();


/* ══════════════════════════════════════════════════════════════
   S3 — PINCH & SPRINKLE — slower deposit rate
══════════════════════════════════════════════════════════════ */
(function(){
  const ID="s3";
  addCard("gs",{id:ID,icon:"🌿",H:205,title:"Pinch & Sprinkle",sub:"Hold and drag to scatter herbs",
    notes:"Deposit rate halved vs v4. Full 2D coverage still required. Canvas platter as dish base."});
  const GCOLS=10,GROWS=5,TARGET=0.25;
  let g,off,isDown,lastP,grid,gridMask,done,_raf;
  const DCX=W=>W*0.5,DCY=H=>H*0.67,DRX=W=>W*0.40,DRY=H=>H*0.155;

  function init(){
    g=IC(ID);off=OS(g.W,g.H);
    grid=new Float32Array(GCOLS*GROWS).fill(0);
    gridMask=new Uint8Array(GCOLS*GROWS).fill(0);
    for(let r=0;r<GROWS;r++)for(let c=0;c<GCOLS;c++){const cx2=(c+0.5)/GCOLS*2-1,cy2=(r+0.5)/GROWS*2-1;if(cx2*cx2+cy2*cy2<0.85)gridMask[r*GCOLS+c]=1;}
    isDown=false;lastP=null;done=false;
    resetCard(ID);off.ctx.clearRect(0,0,g.W,g.H);
    SP(ID,0,"0%");SS(ID,"Hold over the dish and drag slowly back and forth");
    if(_raf)cancelAnimationFrame(_raf);tick();
  }

  function dropHerbs(x,y){
    // Slow rate: only 1 herb per call, random chance to skip
    if(Math.random()>0.45)return; // ~55% skip = half of v4 rate
    const{W,H}=g;
    const angle=Math.random()*Math.PI*2,rad=Math.sqrt(Math.random()*0.88);
    const lx=x+DRX(W)*0.55*rad*Math.cos(angle);
    const ly=DCY(H)+DRY(H)*0.80*rad*Math.sin(angle);
    const ex=(lx-DCX(W))/DRX(W),ey=(ly-DCY(H))/DRY(H);
    if(ex*ex+ey*ey>0.92)return;
    off.ctx.save();off.ctx.translate(lx,ly);off.ctx.rotate(Math.random()*Math.PI*2);
    off.ctx.fillStyle=`hsla(${112+Math.random()*18},52%,${27+Math.random()*12}%,${0.6+Math.random()*0.35})`;
    off.ctx.beginPath();off.ctx.ellipse(0,0,1.8+Math.random()*2,0.8+Math.random()*1.2,0,0,Math.PI*2);off.ctx.fill();
    off.ctx.restore();
    const gc=Math.floor(((lx-(DCX(W)-DRX(W)))/(DRX(W)*2))*GCOLS);
    const gr=Math.floor(((ly-(DCY(H)-DRY(H)))/(DRY(H)*2))*GROWS);

  function onMove(e){if(!isDrag||done)return;e.preventDefault();const x=ep(e,g.cvs).x,dx=x-lastX;jarTgt=Math.max(40,Math.min(g.W-40,jarTgt+dx*0.9));jarVel+=dx*0.5;lastX=x;}
  function onEnd(){isDrag=false;}
  whenReady(ID,()=>{const c=document.getElementById("c-"+ID);c.addEventListener("mousedown",onStart);document.addEventListener("mousemove",onMove);document.addEventListener("mouseup",onEnd);c.addEventListener("touchstart",onStart,{passive:false});c.addEventListener("touchmove",onMove,{passive:false});c.addEventListener("touchend",onEnd);RB(ID,init);init();});

/* ══════════════════════════════════════════════════════════════
   MORTAR & PESTLE
   Larger visual pestle, small 8px hitbox at tip center.
   Much slower animation (0.025 speed vs 0.06 before).
   18 pieces, distributed, no jitter.
══════════════════════════════════════════════════════════════ */
(function(){
  const ID="m1";
  addCard("gm",{id:ID,icon:"🪨",H:230,title:"Mortar &amp; Pestle",sub:"Click precisely on each piece",
    notes:"Pestle visually large — but only the small center tip (8px) crushes pieces. Move slowly and deliberately. 18 pieces."});
  const TOTAL=18;
  let g,pieces,pestAnim,done,_raf,cracks;
  const MCX=W=>W*0.5,MCY=H=>H*0.56,MR=_g=>Math.min(_g.W,_g.H)*0.30*1.2; // 20% bigger bowl

  function makePieces(_g){
    pieces=[];cracks=[];
    const mr=MR(_g),W=_g.W,H=_g.H;
    const COLS=["#8B5E20","#6B4010","#A07030","#7A5018","#5A3808"];
    for(let i=0;i<TOTAL;){
      const a=Math.random()*Math.PI*2;
      const r2=(0.12+Math.random()*0.64)*mr*0.88;
      const x=MCX(W)+Math.cos(a)*r2, y=MCY(H)+Math.sin(a)*r2*0.72;
      const tooClose=pieces.some(p=>Math.sqrt((p.x-x)**2+(p.y-y)**2)<11);
      if(!tooClose){pieces.push({x,y,r:4+Math.random()*4.5,broken:false,frags:[],color:COLS[i%5],rot:i*0.67});i++;}
    }
  }

  function init(){
    g=IC(ID);makePieces(g);
    pestAnim={active:false,tx:0,ty:0,t:0};done=false;
    resetCard(ID);SP(ID,0,"0%");SS(ID,"Click each piece to pound it");
    if(_raf)cancelAnimationFrame(_raf);tick();
  }

  function poundAt(px,py){
    if(done||pestAnim.active)return;
    const mr=MR(g);
    const ddx=px-MCX(g.W),ddy=py-MCY(g.H);
    if(Math.sqrt(ddx*ddx+ddy*ddy)>mr*0.86)return;
    pestAnim={active:true,tx:px,ty:py,t:0};
    // Hitbox = 8px at tip center only
    pieces.forEach(p=>{
      if(p.broken)return;
      if(Math.sqrt((px-p.x)**2+(py-p.y)**2)<p.r+8){
        p.broken=true;
        for(let f=0;f<2+Math.floor(Math.random()*2);f++){
          const fa=Math.random()*Math.PI*2,fd=p.r*(0.5+Math.random()*0.8);
          p.frags.push({x:p.x+Math.cos(fa)*fd,y:p.y+Math.sin(fa)*fd,r:p.r*0.28+Math.random()*p.r*0.18,rot:Math.random()*Math.PI});
        }
        for(let c=0;c<3;c++)cracks.push({x:p.x,y:p.y,a:Math.random()*Math.PI*2,len:p.r*(1+Math.random()),life:1});
      }
    });
  }

  function updateProg(){
    const broken=pieces.filter(p=>p.broken).length;
    const pct=Math.round(broken/TOTAL*100);
    SP(ID,pct,pct+"%");
    if(broken>=TOTAL){done=true;SP(ID,100,"100%");}else SS(ID,`${TOTAL-broken} pieces left`);
  }

  function tick(){
    const{ctx,W,H}=g;ctx.clearRect(0,0,W,H);
    const mcx=MCX(W),mcy=MCY(H),mr=MR(g);

    const mg=ctx.createRadialGradient(mcx-mr*0.2,mcy-mr*0.3,mr*0.1,mcx,mcy,mr*1.1);
    mg.addColorStop(0,"#9A9088");mg.addColorStop(1,"#6A6058");
    ctx.fillStyle=mg;ctx.beginPath();ctx.arc(mcx,mcy,mr*1.05,0,Math.PI*2);ctx.fill();
    const ig=ctx.createRadialGradient(mcx,mcy,mr*0.1,mcx,mcy,mr*0.9);
    ig.addColorStop(0,"#C8C0B4");ig.addColorStop(1,"#A8A098");
    ctx.fillStyle=ig;ctx.beginPath();ctx.ellipse(mcx,mcy,mr*0.84,mr*0.75,0,0,Math.PI*2);ctx.fill();

    cracks.forEach(c=>{c.life-=0.012;ctx.globalAlpha=Math.max(0,c.life*0.6);ctx.strokeStyle="#5A3A10";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(c.x,c.y);ctx.lineTo(c.x+Math.cos(c.a)*c.len,c.y+Math.sin(c.a)*c.len);ctx.stroke();});
    cracks=cracks.filter(c=>c.life>0);ctx.globalAlpha=1;

    ctx.save();ctx.beginPath();ctx.ellipse(mcx,mcy,mr*0.80,mr*0.70,0,0,Math.PI*2);ctx.clip();
    pieces.forEach(p=>{
      if(!p.broken){
        ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
        ctx.fillStyle=p.color;ctx.beginPath();ctx.ellipse(0,0,p.r,p.r*0.70,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle="rgba(255,255,255,0.16)";ctx.beginPath();ctx.ellipse(-p.r*0.25,-p.r*0.28,p.r*0.28,p.r*0.20,0,0,Math.PI*2);ctx.fill();
        ctx.restore();
      } else {
        p.frags.forEach(f=>{ctx.save();ctx.translate(f.x,f.y);ctx.rotate(f.rot);ctx.fillStyle=p.color;ctx.globalAlpha=0.82;ctx.beginPath();ctx.ellipse(0,0,f.r,f.r*0.65,0,0,Math.PI*2);ctx.fill();ctx.restore();});
        ctx.globalAlpha=1;
      }
    });
    ctx.restore();

    // Pestle — column shape: shaft same width as head
    const pestRestX=mcx,pestRestY=mcy-mr*0.92; // slightly higher rest to accommodate longer shaft
    const PHEAD=mr*0.24;
    const COL_W=PHEAD*2.0;
    const SHAFT_LEN=mr*0.858; // 20% longer (was mr*0.715)

    if(pestAnim.active){
      pestAnim.t+=0.025;
      let px,py;
      if(pestAnim.t<0.45){
        const f=pestAnim.t/0.45;const ease=f*f*(3-2*f);
        px=mcx+(pestAnim.tx-mcx)*ease;py=pestRestY+(pestAnim.ty-pestRestY)*ease;
      } else {
        const f=Math.min(1,(pestAnim.t-0.45)/0.55);const ease=f*f*(3-2*f);
        px=pestAnim.tx+(mcx-pestAnim.tx)*ease;py=pestAnim.ty+(pestRestY-pestAnim.ty)*ease;
        if(f>=1){pestAnim.active=false;updateProg();}
      }
      // Shaft — full column width, continuous with head
      ctx.fillStyle="#8A8278";ctx.strokeStyle="#6A6258";ctx.lineWidth=2;
      ctx.beginPath();ctx.roundRect(px-COL_W/2,py-SHAFT_LEN,COL_W,SHAFT_LEN+PHEAD*0.5,COL_W*0.15);ctx.fill();ctx.stroke();
      // Head underside — slightly darker, flatter ellipse at bottom of column
      ctx.fillStyle="#9A9088";ctx.strokeStyle="#7A7068";ctx.lineWidth=2;
      ctx.beginPath();ctx.ellipse(px,py+PHEAD*0.35,PHEAD,PHEAD*0.50,0,0,Math.PI*2);ctx.fill();ctx.stroke();
      // Highlight stripe along shaft
      ctx.fillStyle="rgba(255,255,255,0.14)";
      ctx.beginPath();ctx.roundRect(px-COL_W*0.22,py-SHAFT_LEN*0.9,COL_W*0.2,SHAFT_LEN*0.7,COL_W*0.1);ctx.fill();
    } else {
      ctx.fillStyle="#8A8278";ctx.strokeStyle="#6A6258";ctx.lineWidth=2;
      ctx.beginPath();ctx.roundRect(pestRestX-COL_W/2,pestRestY-SHAFT_LEN,COL_W,SHAFT_LEN+PHEAD*0.5,COL_W*0.15);ctx.fill();ctx.stroke();
      ctx.fillStyle="#9A9088";ctx.strokeStyle="#7A7068";ctx.lineWidth=2;
      ctx.beginPath();ctx.ellipse(pestRestX,pestRestY+PHEAD*0.35,PHEAD,PHEAD*0.50,0,0,Math.PI*2);ctx.fill();ctx.stroke();
      ctx.fillStyle="rgba(255,255,255,0.14)";
      ctx.beginPath();ctx.roundRect(pestRestX-COL_W*0.22,pestRestY-SHAFT_LEN*0.9,COL_W*0.2,SHAFT_LEN*0.7,COL_W*0.1);ctx.fill();
    }
    if(!done)_raf=requestAnimationFrame(tick);
  }

  whenReady(ID,()=>{
    const c=document.getElementById("c-"+ID);
    c.addEventListener("mousedown",e=>{e.preventDefault();const p=ep(e,c);poundAt(p.x,p.y);});
    c.addEventListener("touchstart",e=>{e.preventDefault();const p=ep(e,c);poundAt(p.x,p.y);},{passive:false});
    RB(ID,init);init();
  });
})();

/* ─── HELPERS FROM BRANCH 1 ────────────────────────────────── */
function drawBoard(ctx,x,y,w,h){
  const g=ctx.createLinearGradient(x,y,x,y+h);g.addColorStop(0,"#D4A870");g.addColorStop(0.5,"#C89858");g.addColorStop(1,"#B88848");
  ctx.fillStyle=g;ctx.beginPath();ctx.roundRect(x,y,w,h,6);ctx.fill();
  ctx.strokeStyle="rgba(0,0,0,0.07)";ctx.lineWidth=1;
  for(let i=0;i<6;i++){const gy=y+h*0.12+i*(h*0.13);ctx.beginPath();ctx.moveTo(x+6,gy);ctx.lineTo(x+w-6,gy);ctx.stroke();}
  ctx.strokeStyle="rgba(0,0,0,0.18)";ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(x,y,w,h,6);ctx.stroke();
}

/* ── GUIDE ARROW ─────────────────────────────────────────── */
function drawCircleArrow(ctx,cx,cy,r,alpha=1,cw=true){
  ctx.save();ctx.globalAlpha=alpha;
  const gapAngle=Math.PI*0.18;
  ctx.strokeStyle="rgba(92,110,91,0.85)";ctx.lineWidth=5;ctx.lineCap="round";
  ctx.beginPath();
  if(cw)ctx.arc(cx,cy,r,-Math.PI/2+gapAngle,-Math.PI/2-gapAngle+Math.PI*2,false);
  else ctx.arc(cx,cy,r,-Math.PI/2-gapAngle,-Math.PI/2+gapAngle-Math.PI*2,true);
  ctx.stroke();
  const headAngle=cw?(-Math.PI/2-gapAngle+Math.PI*2):(-Math.PI/2+gapAngle-Math.PI*2);
  const tangent=cw?headAngle+Math.PI/2:headAngle-Math.PI/2;
  const hx=cx+Math.cos(headAngle)*r,hy=cy+Math.sin(headAngle)*r,hs=28;
  ctx.fillStyle="rgba(92,110,91,0.85)";
  ctx.beginPath();ctx.moveTo(hx,hy);
  ctx.lineTo(hx-hs*Math.cos(tangent-0.5),hy-hs*Math.sin(tangent-0.5));
  ctx.lineTo(hx-hs*Math.cos(tangent+0.5),hy-hs*Math.sin(tangent+0.5));
  ctx.closePath();ctx.fill();ctx.restore();
}

/* ── WHISK helpers ───────────────────────────────────────── */
function drawWhistTopDown(ctx,bowlCX,bowlCY,bowlR,whiskOrbitAngle,whiskHeadAngle,foamParts,offCanvas){
  ctx.fillStyle="#C8B8D8";ctx.beginPath();ctx.arc(bowlCX,bowlCY,bowlR,0,Math.PI*2);ctx.fill();
  const bg=ctx.createRadialGradient(bowlCX,bowlCY,0,bowlCX,bowlCY,bowlR*0.88);
  bg.addColorStop(0,"#FFF8E8");bg.addColorStop(0.7,"#F8EDD8");bg.addColorStop(1,"#E8D8C0");
  ctx.fillStyle=bg;ctx.beginPath();ctx.arc(bowlCX,bowlCY,bowlR*0.88,0,Math.PI*2);ctx.fill();
  if(offCanvas){ctx.save();ctx.beginPath();ctx.arc(bowlCX,bowlCY,bowlR*0.86,0,Math.PI*2);ctx.clip();ctx.drawImage(offCanvas,0,0);ctx.restore();}
  foamParts.forEach(f=>{
    f.life-=0.003;ctx.globalAlpha=Math.max(0,f.life*0.95);
    ctx.fillStyle="#FFFFFF";ctx.strokeStyle="rgba(120,100,80,0.7)";ctx.lineWidth=1.2;
    ctx.beginPath();ctx.arc(f.x,f.y,f.r,0,Math.PI*2);ctx.fill();ctx.stroke();
  });
  ctx.globalAlpha=1;
  const wx=bowlCX+Math.cos(whiskOrbitAngle)*bowlR*0.32,wy=bowlCY+Math.sin(whiskOrbitAngle)*bowlR*0.32;
  ctx.save();ctx.translate(wx,wy);ctx.rotate(whiskHeadAngle);
  ctx.strokeStyle="#6B4A2A";ctx.lineWidth=12;ctx.lineCap="round";
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-bowlR*0.68);ctx.stroke();
  ctx.strokeStyle="rgba(160,110,60,0.4)";ctx.lineWidth=6;
  ctx.beginPath();ctx.moveTo(-3,-8);ctx.lineTo(-3,-bowlR*0.64);ctx.stroke();
  ctx.strokeStyle="#B0A898";ctx.lineWidth=4;
  ctx.beginPath();ctx.ellipse(0,0,22,26,0,0,Math.PI*2);ctx.stroke();
  ctx.lineWidth=2.4;ctx.strokeStyle="#C0B8B0";
  for(let t=0;t<4;t++){const ta=t*Math.PI/4;ctx.beginPath();ctx.moveTo(Math.cos(ta)*22,Math.sin(ta)*26);ctx.lineTo(Math.cos(ta+Math.PI)*22,Math.sin(ta+Math.PI)*26);ctx.stroke();}
  ctx.fillStyle="#9A9080";ctx.beginPath();ctx.arc(0,0,8,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

/* ─── CHOPPING ──────────────────────────────────────────────── */
/* ══════════════════════════════════════════════════════════
   CHOP B (unchanged)
══════════════════════════════════════════════════════════ */
(function(){
  const ID="cb";
  addCard("gchop",{id:ID,icon:"🗡️",H:230,title:"Slice the Ingredients",sub:"Drag downward to slice",notes:"9 slices. Drag downward across ingredient. Narrower cuts allowed."});
  const SLICES_NEEDED=9,MIN_STROKE_LEN=40,MIN_VERT_RATIO=0.45;
  let g,slices,done,_raf,cutLines,strokeStart,currentStroke,rejectFlash,successFlash;
  let boardX,boardY,boardW,boardH,ingrX,ingrY,ingrW,ingrH;
  function layout(){const{W,H}=g;boardX=W*0.06;boardY=H*0.35;boardW=W*0.88;boardH=H*0.54;ingrX=W*0.11;ingrY=H*0.44;ingrW=W*0.78;ingrH=H*0.28;}
  function init(){g=IC(ID);layout();slices=0;done=false;cutLines=[];strokeStart=null;currentStroke=null;rejectFlash=0;successFlash=0;resetCard(ID);SP(ID,0,"0%");SS(ID,"Drag downward across the ingredient");if(_raf)cancelAnimationFrame(_raf);tick();}
  function isOnIngr(x,y){return x>ingrX&&x<ingrX+ingrW&&y>ingrY-20&&y<ingrY+ingrH+20;}
  function trySlice(sx,sy,ex,ey){
    const dx=ex-sx,dy=ey-sy,len=Math.sqrt(dx*dx+dy*dy);
    if(len<MIN_STROKE_LEN){SS(ID,"Stroke too short");return;}
    if(Math.abs(dy)/len<MIN_VERT_RATIO){rejectFlash=20;SS(ID,"Drag more downward");return;}
    const midX=(sx+ex)/2;
    if(midX<ingrX+ingrW*0.02||midX>ingrX+ingrW*0.98){SS(ID,"Slice across the ingredient");return;}
    const norm=(midX-ingrX)/ingrW;
    if(cutLines.some(c=>Math.abs(c-norm)*ingrW<12)){SS(ID,"Too close to a previous cut");return;}
    cutLines.push(norm);cutLines.sort((a,b)=>a-b);slices++;successFlash=18;
    const pct=Math.round(slices/SLICES_NEEDED*100);SP(ID,pct,pct+"%");
    if(slices>=SLICES_NEEDED){done=true;SP(ID,100,"100%");}else SS(ID,`${SLICES_NEEDED-slices} more`);
  }
  function drawIngr(ctx){
    const sorted=[0,...cutLines,1],GAP=3;
    for(let i=0;i<sorted.length-1;i++){
      const x0=ingrX+sorted[i]*ingrW+(i>0?GAP:0),x1=ingrX+sorted[i+1]*ingrW-(i<sorted.length-2?GAP:0);
      if(x1-x0<2)continue;
      const bg=ctx.createLinearGradient(x0,ingrY,x0,ingrY+ingrH);
      bg.addColorStop(0,"#8AC060");bg.addColorStop(0.35,"#5A9030");bg.addColorStop(0.7,"#3A7010");bg.addColorStop(1,"#2A5008");
      ctx.fillStyle=bg;
      const topR=i===0?ingrH*0.35:ingrH*0.48,botR=i===sorted.length-2?ingrH*0.35:ingrH*0.48;
      ctx.beginPath();ctx.moveTo(x0,ingrY+ingrH*0.5-topR);ctx.lineTo(x1,ingrY+ingrH*0.5-botR);ctx.lineTo(x1,ingrY+ingrH*0.5+botR);ctx.lineTo(x0,ingrY+ingrH*0.5+topR);ctx.closePath();ctx.fill();
      if(i>0){ctx.fillStyle="rgba(190,230,150,0.7)";ctx.beginPath();ctx.ellipse(x0+1,ingrY+ingrH*0.5,3,ingrH*0.44,0,0,Math.PI*2);ctx.fill();}
      ctx.strokeStyle="rgba(40,80,10,0.18)";ctx.lineWidth=1;
      for(let t=0;t<3;t++){const ty=ingrY+ingrH*0.5+(t-1)*ingrH*0.28;ctx.beginPath();ctx.moveTo(x0,ty);ctx.lineTo(x1,ty);ctx.stroke();}
    }
    if(cutLines.length===0||Math.min(...cutLines)>0.06){ctx.fillStyle="#3A6018";ctx.beginPath();ctx.ellipse(ingrX+3,ingrY+ingrH*0.5,3,ingrH*0.22,0,0,Math.PI*2);ctx.fill();}
  }
  function tick(){
    const{ctx,W,H}=g;ctx.clearRect(0,0,W,H);
    drawBoard(ctx,boardX,boardY,boardW,boardH);drawIngr(ctx);
    if(currentStroke&&strokeStart){ctx.strokeStyle=rejectFlash>0?"rgba(200,60,60,0.5)":"rgba(80,80,80,0.35)";ctx.lineWidth=2.5;ctx.lineCap="round";ctx.beginPath();ctx.moveTo(strokeStart.x,strokeStart.y);ctx.lineTo(currentStroke.x,currentStroke.y);ctx.stroke();}
    if(rejectFlash>0)rejectFlash--;if(successFlash>0){successFlash--;ctx.fillStyle=`rgba(92,110,91,${successFlash/18*0.18})`;ctx.beginPath();ctx.roundRect(boardX,boardY,boardW,boardH,6);ctx.fill();}
    if(slices===0&&!strokeStart){const ax=ingrX+ingrW*0.5,ay=ingrY-38+Math.sin(Date.now()/380)*5;ctx.fillStyle="rgba(92,110,91,0.55)";ctx.font="bold 13px Inter,sans-serif";ctx.textAlign="center";ctx.fillText("drag ↓ across",ax,ay);}
    if(!done)_raf=requestAnimationFrame(tick);
  }
  whenReady(ID,()=>{
    const c=document.getElementById("c-"+ID);
    function onStart(e){if(done)return;e.preventDefault();const p=ep(e,c);if(isOnIngr(p.x,p.y)||p.y<ingrY+ingrH*0.5){strokeStart={...p};currentStroke={...p};}}
    function onMove(e){if(!strokeStart||done)return;e.preventDefault();currentStroke=ep(e,c);}
    function onEnd(e){if(!strokeStart||done)return;e.preventDefault();const p=e.changedTouches?ep(e,c):currentStroke||ep(e,c);trySlice(strokeStart.x,strokeStart.y,p.x,p.y);strokeStart=null;currentStroke=null;}
    c.addEventListener("mousedown",onStart);document.addEventListener("mousemove",onMove);document.addEventListener("mouseup",onEnd);
    c.addEventListener("touchstart",onStart,{passive:false});c.addEventListener("touchmove",onMove,{passive:false});c.addEventListener("touchend",onEnd);
    RB(ID,init);init();
  });
})();

/* ─── WHISKING ──────────────────────────────────────────────── */
/* ══════════════════════════════════════════════════════════
   WHISK C3 (unchanged)
══════════════════════════════════════════════════════════ */
(function(){
  const ID="wc3";
  addCard("gwhisk",{id:ID,icon:"⭕",H:240,title:"Whisk the Ingredients",sub:"Draw circles to whisk",notes:"Draw circles around the bowl. 9 full rotations."});
  let g,off,handle,done,isDown,_raf;
  let whiskOrbit=0,whiskHead=0,foamParts=[],totalAngle=0;
  let bowlCX,bowlCY,bowlR;
  function layout(){const{W,H}=g;bowlCX=W*0.5;bowlCY=H*0.52;bowlR=Math.min(W,H)*0.42;}
  function init(){
    g=IC(ID);layout();off=OS(g.W,g.H);handle={angle:0,last:null};
    done=false;isDown=false;whiskOrbit=-Math.PI/2;whiskHead=0;foamParts=[];totalAngle=0;
    resetCard(ID);off.ctx.clearRect(0,0,g.W,g.H);SP(ID,0,"0%");SS(ID,"Draw circles around the bowl center");
    if(_raf)cancelAnimationFrame(_raf);tick();
  }
  function addFoam(){const fa=Math.random()*Math.PI*2;foamParts.push({x:bowlCX+Math.cos(fa)*bowlR*(0.68+Math.random()*0.22),y:bowlCY+Math.sin(fa)*bowlR*(0.68+Math.random()*0.22),r:5+Math.random()*8,life:1});}
  function writeSwirl(da){const ox=bowlCX+Math.cos(whiskOrbit)*bowlR*0.32,oy=bowlCY+Math.sin(whiskOrbit)*bowlR*0.32;off.ctx.strokeStyle="rgba(220,210,180,0.18)";off.ctx.lineWidth=9+Math.random()*4;off.ctx.lineCap="round";off.ctx.beginPath();off.ctx.arc(ox,oy,bowlR*0.14,whiskHead,whiskHead+Math.PI*0.7,Math.sign(da)<0);off.ctx.stroke();}
  function tick(){
    const{ctx,W,H}=g;ctx.clearRect(0,0,W,H);
    foamParts=foamParts.filter(f=>f.life>0);
    drawWhistTopDown(ctx,bowlCX,bowlCY,bowlR,whiskOrbit,whiskHead,foamParts,off.c);
    drawCircleArrow(ctx,bowlCX,bowlCY,bowlR*0.52,Math.max(0,1-totalAngle/(Math.PI*2*9))*0.55,true);
    if(!done)_raf=requestAnimationFrame(tick);
  }
  function onStart(e){if(done)return;e.preventDefault();isDown=true;const p=ep(e,g.cvs);handle.last=Math.atan2(p.y-bowlCY,p.x-bowlCX);}
  function onMove(e){
    if(!isDown||done)return;e.preventDefault();
    const p=ep(e,g.cvs),a=Math.atan2(p.y-bowlCY,p.x-bowlCX);
    if(handle.last!==null){
      let da=a-handle.last;if(da>Math.PI)da-=Math.PI*2;if(da<-Math.PI)da+=Math.PI*2;
      handle.angle+=da;whiskOrbit+=da*0.95;whiskHead+=da*1.1;
      writeSwirl(da);if(Math.random()<0.35)addFoam();
      totalAngle+=Math.abs(da);
      const totalNeeded=Math.PI*2*9;
      const pct=Math.min(100,Math.round(totalAngle/totalNeeded*100));
      SP(ID,pct,pct+"%");
      if(totalAngle>=totalNeeded){done=true;SP(ID,100,"100%");}
      else SS(ID,`${Math.round((totalNeeded-totalAngle)/(Math.PI*2)*10)/10} rotations left`);
    }
    handle.last=a;
  }
  function onEnd(){isDown=false;handle.last=null;}
  whenReady(ID,()=>{
    const c=document.getElementById("c-"+ID);
    c.addEventListener("mousedown",onStart);document.addEventListener("mousemove",onMove);document.addEventListener("mouseup",onEnd);
    c.addEventListener("touchstart",onStart,{passive:false});c.addEventListener("touchmove",onMove,{passive:false});c.addEventListener("touchend",onEnd);
    RB(ID,init);init();
  });
})();

/* ─── FOOD PROCESSOR ────────────────────────────────────────── */
/* ══════════════════════════════════════════════════════════
   FOOD PROCESSOR — shared infrastructure
   Food-shaped particles (not spheres): carrot chunks, leaves,
   beans, nuts. Earthy palette. Curved crescent blades.
   Tall narrow PULSE button. Two variants differ in details.
══════════════════════════════════════════════════════════ */

/* ── Food particle shapes ────────────────────────────────── */
const FP_SHAPES=[
  // 0: carrot chunk — orange rounded rectangle, slightly tapered
  function(ctx,r,color){
    ctx.fillStyle=color;
    ctx.beginPath();ctx.roundRect(-r*0.55,-r*0.4,r*1.1,r*0.85,r*0.18);ctx.fill();
    // fibres
    ctx.strokeStyle="rgba(200,120,20,0.35)";ctx.lineWidth=0.7;
    for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(-r*0.35+i*r*0.3,-r*0.38);ctx.lineTo(-r*0.38+i*r*0.32,r*0.42);ctx.stroke();}
  },
  // 1: leaf — green ellipse, pointed ends
  function(ctx,r,color){
    ctx.fillStyle=color;
    ctx.save();ctx.rotate(Math.PI*0.12);
    ctx.beginPath();ctx.ellipse(0,0,r*0.42,r*0.85,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
    // vein
    ctx.strokeStyle="rgba(30,80,10,0.35)";ctx.lineWidth=0.8;
    ctx.beginPath();ctx.moveTo(0,-r*0.8);ctx.lineTo(0,r*0.8);ctx.stroke();
  },
  // 2: bean — dark oval with crease
  function(ctx,r,color){
    ctx.fillStyle=color;
    ctx.beginPath();ctx.ellipse(0,0,r*0.5,r*0.75,0.2,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle="rgba(40,25,10,0.4)";ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(-r*0.1,-r*0.6);ctx.quadraticCurveTo(-r*0.4,0,-r*0.1,r*0.6);ctx.stroke();
  },
  // 3: nut — beige irregular oval
  function(ctx,r,color){
    ctx.fillStyle=color;
    ctx.beginPath();
    ctx.moveTo(0,-r*0.8);ctx.bezierCurveTo(r*0.6,-r*0.7,r*0.65,r*0.3,r*0.1,r*0.8);
    ctx.bezierCurveTo(-r*0.55,r*0.75,-r*0.65,r*0.2,-r*0.05,-r*0.8);ctx.closePath();ctx.fill();
    ctx.strokeStyle="rgba(100,70,20,0.3)";ctx.lineWidth=0.8;ctx.stroke();
  }
];
// Earthy palette: carrot orange, herb green, bean dark-brown, nut tan, dark-green leaf
const FP_COLORS=["#C8641A","#3A7818","#4A2E10","#8B6030","#2A5C14"];
const FP_COLOR_FOR_SHAPE=[0,2,3,4,1]; // shape idx → color idx

/* ── Curved crescent blade ───────────────────────────────── */
function drawCrescentBlade(ctx,cx,cy,R,angle,speed){
  ctx.save();ctx.translate(cx,cy);ctx.rotate(angle);
  const op=0.55+speed*0.45;
  // Two crescent blades, 180° apart
  for(let side=0;side<2;side++){
    ctx.save();ctx.rotate(side*Math.PI);
    // Crescent = large arc minus small offset arc, filled as a path
    const outer=R*0.78, inner=R*0.56, sweep=Math.PI*0.72;
    const startA=-sweep/2, endA=sweep/2;
    // Metallic gradient along the blade
    const bladeGrad=ctx.createLinearGradient(0,0,outer,0);
    bladeGrad.addColorStop(0,`rgba(140,132,122,${op})`);
    bladeGrad.addColorStop(0.4,`rgba(200,194,186,${op})`);
    bladeGrad.addColorStop(0.75,`rgba(185,178,170,${op})`);
    bladeGrad.addColorStop(1,`rgba(160,152,142,${op*0.7})`);
    ctx.fillStyle=bladeGrad;
    ctx.beginPath();
    // Outer arc (leading edge)
    ctx.arc(0,0,outer,startA-0.15,endA+0.08,false);
    // Inner arc back (trailing edge — concave curve)
    ctx.arc(R*0.12,R*0.06,inner,endA+0.12,startA-0.12,true);
    ctx.closePath();
    ctx.fill();
    // Sharp leading edge highlight
    ctx.strokeStyle=`rgba(230,224,218,${op*0.7})`;ctx.lineWidth=1.5;ctx.lineCap="round";
    ctx.beginPath();ctx.arc(0,0,outer,startA-0.12,endA+0.05,false);ctx.stroke();
    ctx.restore();
  }
  // Hub
  const hg=ctx.createRadialGradient(0,0,0,0,0,R*0.10);
  hg.addColorStop(0,`rgba(200,192,182,${op})`);hg.addColorStop(1,`rgba(150,142,132,${op})`);
  ctx.fillStyle=hg;ctx.strokeStyle=`rgba(120,112,102,${op*0.6})`;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(0,0,R*0.10,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.restore();
}

/* ── FP factory ──────────────────────────────────────────── */
function makeFP(ID,title,PULSES,CYCLE_FRAMES,btnColor,notes){
  addCard("gfp2",{id:ID,icon:"⚙️",H:270,title,sub:"Press PULSE to process",notes});

  const N_PARTS=35;
  let g,pulses,done,_raf,phase,pulseCooldown;
  let particles=[],bladeAngle=0,bladeSpeed=0;
  let bowlCX,bowlCY,bowlR,btnX,btnY,btnW,btnH;
  let trailOff;

  function initParticles(){
    particles=[];
    for(let i=0;i<N_PARTS;i++){
      const shapeIdx=i%4;
      const colorIdx=FP_COLOR_FOR_SHAPE[shapeIdx];
      const a=Math.random()*Math.PI*2,r=Math.random()*bowlR*0.68;
      const baseR=(5+Math.random()*7)*1.5;
      particles.push({
        x:bowlCX+Math.cos(a)*r, y:bowlCY+Math.sin(a)*r,
        r:baseR, baseR, vx:0, vy:0,
        shapeIdx, color:FP_COLORS[colorIdx],
        rot:Math.random()*Math.PI*2, rotV:0
      });
    }
  }

  function layout(){
    const{W,H}=g;
    bowlCX=W*0.56;bowlCY=H*0.46;bowlR=Math.min(W,H)*0.36;
    // Tall narrow button — left side
    btnW=W*0.14;btnH=H*0.44;
    btnX=W*0.06;btnY=(H-btnH)/2;
  }

  function init(){
    g=IC(ID);layout();trailOff=OS(g.W,g.H);
    pulses=0;done=false;phase="idle";pulseCooldown=0;bladeAngle=0;bladeSpeed=0;
    resetCard(ID);SP(ID,0,"0%");SS(ID,"Press PULSE to process");
    initParticles();if(_raf)cancelAnimationFrame(_raf);tick();
  }

  function doPulse(){
    if(phase!=="idle"||done)return;
    phase="spinning";pulseCooldown=CYCLE_FRAMES;bladeSpeed=0;
    trailOff.ctx.globalAlpha=0.12;trailOff.ctx.fillStyle="#F2EDE0";trailOff.ctx.fillRect(0,0,g.W,g.H);trailOff.ctx.globalAlpha=1;
  }

  function tick(){
    const{ctx,W,H}=g;ctx.clearRect(0,0,W,H);

    if(phase==="spinning"){
      pulseCooldown--;
      const t=(CYCLE_FRAMES-pulseCooldown)/CYCLE_FRAMES;
      if(t<0.18)bladeSpeed=Math.min(0.28,t/0.18*0.28);
      else if(t<0.65)bladeSpeed=0.28;
      else bladeSpeed=Math.max(0,(1-t)/0.35*0.28);
      bladeAngle+=bladeSpeed;

      particles.forEach(p=>{
        const dx=p.x-bowlCX,dy=p.y-bowlCY,d=Math.sqrt(dx*dx+dy*dy)||1;
        p.vx+=(-dy/d)*bladeSpeed*2.4-dx*0.009;
        p.vy+=(dx/d)*bladeSpeed*2.4-dy*0.009;
        p.x+=p.vx;p.y+=p.vy;p.vx*=0.90;p.vy*=0.90;
        p.rotV+=bladeSpeed*0.8;p.rot+=p.rotV;p.rotV*=0.85;
        const dx2=p.x-bowlCX,dy2=p.y-bowlCY,d2=Math.sqrt(dx2*dx2+dy2*dy2);
        if(d2>bowlR*0.85){const sc=bowlR*0.83/d2;p.x=bowlCX+dx2*sc;p.y=bowlCY+dy2*sc;p.vx*=-0.4;p.vy*=-0.4;}
      });

      trailOff.ctx.globalAlpha=0.05;trailOff.ctx.fillStyle="#EAE4D0";trailOff.ctx.fillRect(0,0,W,H);trailOff.ctx.globalAlpha=1;
      particles.forEach(p=>{
        trailOff.ctx.save();trailOff.ctx.translate(p.x,p.y);trailOff.ctx.rotate(p.rot);
        trailOff.ctx.globalAlpha=0.22;
        FP_SHAPES[p.shapeIdx](trailOff.ctx,p.r*0.55,p.color);
        trailOff.ctx.globalAlpha=1;trailOff.ctx.restore();
      });

      if(pulseCooldown<=0){
        phase="idle";pulses++;
        const shrink=Math.pow(0.78,pulses);
        particles.forEach(p=>{p.r=Math.max(1.2,p.baseR*shrink);p.vx=0;p.vy=0;p.rotV=0;});
        const pct=Math.round(pulses/PULSES*100);SP(ID,pct,pct+"%");
        if(pulses>=PULSES){done=true;SP(ID,100,"100%");}
        else SS(ID,`${PULSES-pulses} more pulse${PULSES-pulses!==1?"s":""}`);
      }
    }

    // Bowl
    ctx.fillStyle="#B8B0C8";ctx.beginPath();ctx.arc(bowlCX,bowlCY,bowlR+5,0,Math.PI*2);ctx.fill();
    const bg=ctx.createRadialGradient(bowlCX,bowlCY,0,bowlCX,bowlCY,bowlR);
    bg.addColorStop(0,"#F8F2E4");bg.addColorStop(0.8,"#EAE0CE");bg.addColorStop(1,"#D8CCBA");
    ctx.fillStyle=bg;ctx.beginPath();ctx.arc(bowlCX,bowlCY,bowlR,0,Math.PI*2);ctx.fill();

    ctx.save();ctx.beginPath();ctx.arc(bowlCX,bowlCY,bowlR*0.93,0,Math.PI*2);ctx.clip();ctx.drawImage(trailOff.c,0,0,W,H);ctx.restore();

    ctx.save();ctx.beginPath();ctx.arc(bowlCX,bowlCY,bowlR*0.88,0,Math.PI*2);ctx.clip();
    particles.forEach(p=>{
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
      FP_SHAPES[p.shapeIdx](ctx,p.r,p.color);
      ctx.restore();
    });
    ctx.restore();

    drawCrescentBlade(ctx,bowlCX,bowlCY,bowlR*0.82,bladeAngle,bladeSpeed/0.28);

    ctx.strokeStyle="rgba(255,255,255,0.4)";ctx.lineWidth=3;ctx.beginPath();ctx.arc(bowlCX,bowlCY,bowlR,Math.PI*1.1,Math.PI*1.7);ctx.stroke();
    ctx.strokeStyle="#9890A8";ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(bowlCX,bowlCY,bowlR+5,0,Math.PI*2);ctx.stroke();

    // Tall narrow PULSE button
    const btnActive=phase==="idle"&&!done;
    ctx.fillStyle="rgba(0,0,0,0.15)";ctx.beginPath();ctx.roundRect(btnX+2,btnY+3,btnW,btnH,10);ctx.fill();
    const [bc,bs]=btnColor;
    ctx.fillStyle=btnActive?bc:`rgba(${parseInt(bc.slice(1,3),16)},${parseInt(bc.slice(3,5),16)},${parseInt(bc.slice(5,7),16)},0.35)`;
    ctx.strokeStyle=btnActive?bs:"transparent";ctx.lineWidth=2.5;
    ctx.beginPath();ctx.roundRect(btnX,btnY,btnW,btnH,10);ctx.fill();ctx.stroke();
    if(btnActive){ctx.shadowColor=bs;ctx.shadowBlur=16;ctx.beginPath();ctx.roundRect(btnX,btnY,btnW,btnH,10);ctx.stroke();ctx.shadowBlur=0;}
    // Text: 80% of button height
    const fontSize=btnH*0.80/5; // 5 chars in PULSE, each ~0.16 of height
    ctx.fillStyle=btnActive?"#FFFFFF":"rgba(200,220,200,0.5)";
    ctx.font=`bold ${fontSize}px Inter,sans-serif`;ctx.textAlign="center";
    // Write "PULSE" vertically
    const letters="PULSE";const letterH=btnH*0.80/letters.length;
    letters.split("").forEach((ch,i)=>{
      ctx.fillText(ch,btnX+btnW/2,btnY+btnH*0.10+letterH*(i+0.85));
    });
    // Pulse count
    ctx.font=`${btnH*0.065}px Inter,sans-serif`;
    ctx.fillStyle=btnActive?"rgba(220,255,220,0.9)":"rgba(120,160,120,0.6)";
    ctx.fillText(`${pulses}/${PULSES}`,btnX+btnW/2,btnY+btnH*0.93);
    // Activity ring when spinning
    if(phase==="spinning"){
      const ang=Date.now()/100;
      ctx.strokeStyle="rgba(150,255,150,0.7)";ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(btnX+btnW/2,btnY+btnH*0.5,btnW*0.38,ang,ang+Math.PI*1.2);ctx.stroke();
    }

    if(!done)_raf=requestAnimationFrame(tick);
  }

  whenReady(ID,()=>{
    const c=document.getElementById("c-"+ID);
    function onClick(e){
      e.preventDefault();if(done||phase!=="idle")return;
      const p=ep(e,c);if(p.x>=btnX&&p.x<=btnX+btnW&&p.y>=btnY&&p.y<=btnY+btnH)doPulse();
    }
    c.addEventListener("mousedown",onClick);c.addEventListener("touchstart",onClick,{passive:false});
    RB(ID,init);init();
  });
}

// FP Variant 1: 5 pulses, 130-frame animation, green button
// FP Variant 2: 5 pulses, 90-frame animation (crisper), teal button, faster shrink
makeFP("fp2","Process the Ingredients",5,90,
  ["#1A5A6A","#2AAAC4"],
  "5 pulses. 90-frame animation per pulse — snappier rhythm. Teal button. Same shapes. Slightly more aggressive shrink per pulse.");

/* ─── ROLL OUT THE DOUGH ────────────────────────────────────── */
/* ══════════════════════════════════════════════════════════
   ROLL OUT THE DOUGH — shared dough renderer
   Key fix: doughHCurrent interpolates smoothly to doughHTarget.
   The dimple animation drives height down during the pass;
   it arrives at the new target naturally.
   Seamless base: a solid-color flat pancake layer + the arch
   shape drawn in the same color, no separate edges.
══════════════════════════════════════════════════════════ */

/* ── Dough shape renderer ────────────────────────────────── */
// DOUGH_COLOR: single solid color for seamless look
const DOUGH_COLOR="#EDE8D8";
const DOUGH_BASE_H=0.055; // base pancake as fraction of canvas H — never compressed

function drawDoughShape(ctx,leftX,rightX,floorY,archH,baseH,dimples){
  // Draw as ONE unified solid shape: base pancake + arch on top, no internal edges.
  // The arch profile:
  const cx=(leftX+rightX)/2, halfW=(rightX-leftX)/2;
  const N=60;
  const topPts=[];
  for(let i=0;i<=N;i++){
    const t=i/N,x=leftX+t*(rightX-leftX),nx=(x-cx)/halfW;
    let a=Math.pow(Math.max(0,Math.cos(nx*Math.PI*0.5)),1.5);
    // Apply dimples
    dimples.forEach(d=>{const dx=(x-d.x)/d.w;a-=d.depth*Math.exp(-dx*dx*2.5);});
    a=Math.max(0,a);
    topPts.push({x,y:floorY-baseH-archH*a});
  }

  // Base extends slightly wider than arch on each side, with rounded bottom corners
  const baseMargin=(rightX-leftX)*0.06; // 6% wider each side
  const baseLeft=leftX-baseMargin, baseRight=rightX+baseMargin;
  const cornerR=Math.min(12,(rightX-leftX)*0.04); // rounded corner radius

  ctx.beginPath();
  // Bottom-left rounded corner
  ctx.moveTo(baseLeft+cornerR,floorY);
  ctx.lineTo(baseRight-cornerR,floorY);
  // Bottom-right rounded corner
  ctx.quadraticCurveTo(baseRight,floorY,baseRight,floorY-cornerR);
  // Right side up to arch start
  ctx.lineTo(topPts[N].x,topPts[N].y);
  // Arch top (smooth)
  for(let i=N-1;i>=0;i--){
    const mx=(topPts[i].x+topPts[i+1].x)/2,my=(topPts[i].y+topPts[i+1].y)/2;
    ctx.quadraticCurveTo(topPts[i+1].x,topPts[i+1].y,mx,my);
  }
  // Left side down
  ctx.lineTo(baseLeft,floorY-cornerR);
  // Bottom-left rounded corner
  ctx.quadraticCurveTo(baseLeft,floorY,baseLeft+cornerR,floorY);
  ctx.closePath();

  ctx.fillStyle=DOUGH_COLOR;ctx.fill();

  // Single soft shading pass — subtle, stays unified
  const sg=ctx.createLinearGradient(cx,floorY-baseH-archH,cx,floorY);
  sg.addColorStop(0,"rgba(255,255,255,0.22)");
  sg.addColorStop(0.35,"rgba(255,255,255,0.08)");
  sg.addColorStop(1,"rgba(0,0,0,0.06)");
  ctx.fillStyle=sg;
  // Re-draw same path for gradient overlay
  ctx.beginPath();
  ctx.moveTo(baseLeft+cornerR,floorY);ctx.lineTo(baseRight-cornerR,floorY);
  ctx.quadraticCurveTo(baseRight,floorY,baseRight,floorY-cornerR);
  ctx.lineTo(topPts[N].x,topPts[N].y);
  for(let i=N-1;i>=0;i--){const mx=(topPts[i].x+topPts[i+1].x)/2,my=(topPts[i].y+topPts[i+1].y)/2;ctx.quadraticCurveTo(topPts[i+1].x,topPts[i+1].y,mx,my);}
  ctx.lineTo(baseLeft,floorY-cornerR);ctx.quadraticCurveTo(baseLeft,floorY,baseLeft+cornerR,floorY);
  ctx.closePath();ctx.fill();
}

/* ── Rolling pin variants ────────────────────────────────── */

// Pin A: End-grain wood texture — concentric rings + radial rays with natural offsets.
// The angle offset rotates the entire pattern, making rotation clearly visible.
function drawPinWoodGrain(ctx, pinX, pinY, pinR, angle){
  ctx.save();
  ctx.translate(pinX, pinY);

  // Shadow
  ctx.fillStyle="rgba(0,0,0,0.10)";
  ctx.beginPath();ctx.ellipse(3,pinR*0.28,pinR,pinR*0.28,0,0,Math.PI*2);ctx.fill();

  // Base fill — warm honey
  const bg=ctx.createRadialGradient(-pinR*0.18,-pinR*0.2,0,0,0,pinR);
  bg.addColorStop(0,"#F2DC9A");bg.addColorStop(0.45,"#D4A050");bg.addColorStop(0.82,"#B07828");bg.addColorStop(1,"#8A5818");
  ctx.fillStyle=bg;ctx.beginPath();ctx.arc(0,0,pinR,0,Math.PI*2);ctx.fill();

  // Clip to circle for all grain elements
  ctx.save();ctx.beginPath();ctx.arc(0,0,pinR*0.98,0,Math.PI*2);ctx.clip();

  // Concentric annual rings — slightly off-center for natural look
  // The rings themselves don't rotate, but their thickness variation
  // creates a fixed pattern. The radial rays rotate.
  const rings=[0.22,0.38,0.52,0.64,0.74,0.83,0.91];
  rings.forEach((r,i)=>{
    // Offset center slightly for each ring — natural growth irregularity
    const ox=Math.sin(i*1.4)*pinR*0.06, oy=Math.cos(i*2.1)*pinR*0.05;
    ctx.strokeStyle=`rgba(90,45,8,${0.18+i*0.04})`;
    ctx.lineWidth=1.2+i*0.3;
    ctx.beginPath();ctx.arc(ox,oy,r*pinR,0,Math.PI*2);ctx.stroke();
  });

  // Radial medullary rays — rotate with angle, uneven spacing for natural look
  ctx.rotate(angle);
  const rayAngles=[0, 0.55, 1.0, 1.62, 2.3, 2.85, 3.5, 4.2, 4.9, 5.6];
  rayAngles.forEach(ra=>{
    ctx.strokeStyle="rgba(80,38,6,0.22)";ctx.lineWidth=0.9;
    ctx.beginPath();ctx.moveTo(Math.cos(ra)*pinR*0.06,Math.sin(ra)*pinR*0.06);
    ctx.lineTo(Math.cos(ra)*pinR*0.94,Math.sin(ra)*pinR*0.94);ctx.stroke();
  });
  // A few wider, darker rays for contrast
  [0.3, 2.1, 4.0].forEach(ra=>{
    ctx.strokeStyle="rgba(70,30,4,0.38)";ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(Math.cos(ra)*pinR*0.08,Math.sin(ra)*pinR*0.08);
    ctx.lineTo(Math.cos(ra)*pinR*0.90,Math.sin(ra)*pinR*0.90);ctx.stroke();
  });
  ctx.restore(); // unclip

  // Outer rim
  ctx.strokeStyle="rgba(80,40,8,0.55)";ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(0,0,pinR,0,Math.PI*2);ctx.stroke();
  // Inner pith dot
  ctx.fillStyle="rgba(60,28,4,0.5)";ctx.beginPath();ctx.arc(0,0,pinR*0.06,0,Math.PI*2);ctx.fill();

  ctx.restore();
}

// Pin B: Spoke/dial markings — bold wedge segments like a clock face.
// Clearly shows rotation without needing to interpret wood texture.
function drawPinSpoke(ctx, pinX, pinY, pinR, angle){
  ctx.save();
  ctx.translate(pinX, pinY);

  // Shadow
  ctx.fillStyle="rgba(0,0,0,0.10)";
  ctx.beginPath();ctx.ellipse(3,pinR*0.28,pinR,pinR*0.28,0,0,Math.PI*2);ctx.fill();

  // Base fill
  const bg=ctx.createRadialGradient(-pinR*0.2,-pinR*0.22,0,0,0,pinR);
  bg.addColorStop(0,"#EED898");bg.addColorStop(0.5,"#C89840");bg.addColorStop(1,"#906018");
  ctx.fillStyle=bg;ctx.beginPath();ctx.arc(0,0,pinR,0,Math.PI*2);ctx.fill();

  // Clip for spokes
  ctx.save();ctx.beginPath();ctx.arc(0,0,pinR*0.97,0,Math.PI*2);ctx.clip();
  ctx.rotate(angle);

  // 6 alternating light/dark wedge segments — like slices of a pie
  const N=6;
  for(let i=0;i<N;i++){
    const a0=(i/N)*Math.PI*2, a1=((i+0.48)/N)*Math.PI*2;
    ctx.fillStyle=i%2===0?"rgba(80,38,6,0.32)":"rgba(255,235,180,0.18)";
    ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,pinR*0.93,a0,a1);ctx.closePath();ctx.fill();
  }

  // Bold spokes
  for(let i=0;i<N;i++){
    const a=(i/N)*Math.PI*2;
    ctx.strokeStyle=`rgba(70,30,4,${i%2===0?0.55:0.22})`;
    ctx.lineWidth=i%2===0?2.5:1;
    ctx.beginPath();ctx.moveTo(Math.cos(a)*pinR*0.12,Math.sin(a)*pinR*0.12);
    ctx.lineTo(Math.cos(a)*pinR*0.90,Math.sin(a)*pinR*0.90);ctx.stroke();
  }

  // Concentric accent rings
  [0.40,0.68,0.88].forEach(r=>{
    ctx.strokeStyle="rgba(90,42,8,0.25)";ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(0,0,r*pinR,0,Math.PI*2);ctx.stroke();
  });
  ctx.restore(); // unclip

  // Outer rim
  ctx.strokeStyle="rgba(75,36,6,0.60)";ctx.lineWidth=2.5;
  ctx.beginPath();ctx.arc(0,0,pinR,0,Math.PI*2);ctx.stroke();
  // Center hub
  const hg=ctx.createRadialGradient(0,0,0,0,0,pinR*0.14);
  hg.addColorStop(0,"#F0D890");hg.addColorStop(1,"#906018");
  ctx.fillStyle=hg;ctx.beginPath();ctx.arc(0,0,pinR*0.14,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle="rgba(70,30,4,0.5)";ctx.lineWidth=1.5;ctx.stroke();

  ctx.restore();
}

// Pin style B: 3/4 cylinder (more realistic depth)
function drawPinCylinder(ctx,pinX,pinY,halfLen,pinR){
  // Shadow beneath
  ctx.fillStyle="rgba(0,0,0,0.08)";ctx.beginPath();ctx.ellipse(pinX+2,pinY+pinR+5,halfLen,pinR*0.25,0,0,Math.PI*2);ctx.fill();

  // Left end cap
  const capLX=pinX-halfLen;
  const lcg=ctx.createRadialGradient(capLX-pinR*0.3,pinY-pinR*0.3,0,capLX,pinY,pinR);
  lcg.addColorStop(0,"#F0D8A8");lcg.addColorStop(0.6,"#C89840");lcg.addColorStop(1,"#906820");
  ctx.fillStyle=lcg;ctx.beginPath();ctx.ellipse(capLX,pinY,pinR*0.28,pinR,0,0,Math.PI*2);ctx.fill();

  // Cylinder body (top face)
  const bodyGrad=ctx.createLinearGradient(pinX,pinY-pinR,pinX,pinY+pinR);
  bodyGrad.addColorStop(0,"#F0D8A8");bodyGrad.addColorStop(0.3,"#D4A860");bodyGrad.addColorStop(0.6,"#C09040");bodyGrad.addColorStop(1,"#906820");
  ctx.fillStyle=bodyGrad;
  ctx.beginPath();
  ctx.ellipse(pinX-halfLen,pinY,pinR*0.28,pinR,0,-Math.PI/2,Math.PI/2);
  ctx.ellipse(pinX+halfLen,pinY,pinR*0.28,pinR,0,Math.PI/2,-Math.PI/2,false);
  ctx.closePath();ctx.fill();

  // Right end cap
  const rcg=ctx.createRadialGradient(pinX+halfLen-pinR*0.3,pinY-pinR*0.3,0,pinX+halfLen,pinY,pinR);
  rcg.addColorStop(0,"#E8D098");rcg.addColorStop(0.6,"#B88838");rcg.addColorStop(1,"#806018");
  ctx.fillStyle=rcg;ctx.beginPath();ctx.ellipse(pinX+halfLen,pinY,pinR*0.28,pinR,0,0,Math.PI*2);ctx.fill();

  // Surface highlight
  ctx.strokeStyle="rgba(255,245,210,0.5)";ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(pinX-halfLen+2,pinY-pinR*0.55);ctx.lineTo(pinX+halfLen-2,pinY-pinR*0.55);ctx.stroke();

  // Handles
  const hL=halfLen*0.22;
  [pinX-halfLen-hL,pinX+halfLen].forEach(hx=>{
    ctx.fillStyle="#6A3E18";ctx.strokeStyle="#4A2A08";ctx.lineWidth=1;
    ctx.beginPath();ctx.roundRect(hx,pinY-pinR*0.5,hL,pinR*1.0,4);ctx.fill();ctx.stroke();
    // Handle end ring
    ctx.strokeStyle="#3A1A04";ctx.lineWidth=2;
    ctx.beginPath();ctx.ellipse(hx+(hx<pinX?0:hL),pinY,3,pinR*0.5,0,0,Math.PI*2);ctx.stroke();
  });
}

/* ── Roll variant factory ────────────────────────────────── */
function makeRoll(ID,title,pinStyle,notes){
  addCard("gdough",{id:ID,icon:"🎂",H:250,title,sub:"Click to send the rolling pin across",notes});
  const PASSES=8;
  const INIT_H_FRAC=0.50,FINAL_H_FRAC=0.09;
  const BASE_H_FRAC=DOUGH_BASE_H;

  let g,passes,done,_raf;
  let pinAnim=null;
  let pinAngle=0; // accumulated rotation angle for texture
  // Smooth height interpolation
  let doughHTarget,doughHCurrent;
  let doughLeft,doughRight,floorY;
  let activeDimple=[],dir=1;

  function getDoughGeom(passCount){
    const{W,H}=g;
    const prog=passCount/PASSES;
    const h=(INIT_H_FRAC+(FINAL_H_FRAC-INIT_H_FRAC)*prog)*H;
    const initHW=W*0.22,finalHW=W*0.44;
    const hw=initHW+(finalHW-initHW)*prog;
    return{h,leftX:W/2-hw,rightX:W/2+hw};
  }

  function init(){
    g=IC(ID);passes=0;done=false;pinAnim=null;activeDimple=[];dir=1;pinAngle=0;
    floorY=g.H*0.80;
    const geom=getDoughGeom(0);
    doughHTarget=geom.h;doughHCurrent=geom.h;
    doughLeft=geom.leftX;doughRight=geom.rightX;
    resetCard(ID);SP(ID,0,"0%");SS(ID,"Click to roll the pin across");
    if(_raf)cancelAnimationFrame(_raf);tick();
  }

  function startRoll(){if(done||pinAnim)return;pinAnim={t:0};activeDimple=[];}

  function tick(){
    const{ctx,W,H}=g;ctx.clearRect(0,0,W,H);
    drawBoard(ctx,W*0.04,floorY,W*0.92,H*0.20);

    const baseH=BASE_H_FRAC*H;

    // ── Animation update ──
    if(pinAnim){
      pinAnim.t+=0.0055; // half speed
      if(pinAnim.t>=1){
        // Pass complete: snap target, finish interpolation
        passes++;
        const geom=getDoughGeom(passes);
        doughHTarget=geom.h;
        // Width also updates immediately from passes count
        doughLeft=geom.leftX;doughRight=geom.rightX;
        pinAnim=null;activeDimple=[];dir=-dir;
        const pct=Math.round(passes/PASSES*100);SP(ID,pct,pct+"%");
        if(passes>=PASSES){done=true;SP(ID,100,"100%");}
        else SS(ID,`${PASSES-passes} more pass${PASSES-passes!==1?"es":""}`);
      } else {
        const pinW=W*0.30;
        const pinR=pinW*0.16; // 2× bigger
        // Cubic ease-in/out (smoothstep): slow start, fast middle, slow end
        const ease=pinAnim.t*pinAnim.t*(3-2*pinAnim.t);
        // Pin starts just outside the dough edge, not far off-canvas
        const doughWidth=doughRight-doughLeft;
        const INSET=doughWidth*0.20; // 20% inset from each edge = 60% total travel
        const fromX=dir>0?doughLeft+INSET:doughRight-INSET;
        const toX=dir>0?doughRight-INSET:doughLeft+INSET;
        const pinX=fromX+ease*(toX-fromX);

        // Dimple depth: bell curve peaks at mid-pass, also drives height reduction
        const dimpleDepth=Math.sin(pinAnim.t*Math.PI)*0.28;
        if(pinX>doughLeft-pinW&&pinX<doughRight+pinW){
          activeDimple=[{x:pinX,w:pinW*0.5,depth:dimpleDepth}];
        } else {
          activeDimple=[];
        }
        // doughHCurrent tracks toward target but also pushed down by dimple
        const geomNext=getDoughGeom(passes+1);
        const compressionFrac=Math.sin(pinAnim.t*Math.PI); // 0→1→0
        const interpH=doughHCurrent+(geomNext.h-doughHCurrent)*compressionFrac*0.55;
        doughHCurrent+=(interpH-doughHCurrent)*0.08;
        // Width gradually expands as pin presses
        const curGeom=getDoughGeom(passes);
        doughLeft=curGeom.leftX+(geomNext.leftX-curGeom.leftX)*compressionFrac*0.7;
        doughRight=curGeom.rightX+(geomNext.rightX-curGeom.rightX)*compressionFrac*0.7;

        // Rotation: ~0.9 turns per pass (60% of 1.5, matching shorter 60% travel distance).
        // One pass ≈ 182 frames. 0.9 rotations = 0.9*2π total → π*1.8/182 per frame.
        pinAngle+=dir*(Math.PI*1.8/182);

        // Draw pin
        if(pinStyle==="grain"){
          drawPinWoodGrain(ctx,pinX,floorY-doughHCurrent-baseH-pinR*0.5,pinR*1.2,pinAngle);
        } else {
          drawPinSpoke(ctx,pinX,floorY-doughHCurrent-baseH-pinR*0.5,pinR*1.2,pinAngle);
        }
      }
    }

    // Smooth settle when no animation
    if(!pinAnim){
      doughHCurrent+=(doughHTarget-doughHCurrent)*0.12;
      const targ=getDoughGeom(passes);
      doughLeft+=(targ.leftX-doughLeft)*0.12;
      doughRight+=(targ.rightX-doughRight)*0.12;
    }

    drawDoughShape(ctx,doughLeft,doughRight,floorY,doughHCurrent,baseH,activeDimple);

    // Hint
    if(!pinAnim&&!done&&passes===0){
      ctx.fillStyle="rgba(92,110,91,0.6)";ctx.font="bold 13px Inter,sans-serif";ctx.textAlign="center";
      const ay=floorY-doughHCurrent-baseH-50+Math.sin(Date.now()/400)*5;
      ctx.fillText("click to roll →",W/2,ay);
    }
    if(!done)_raf=requestAnimationFrame(tick);
  }

  whenReady(ID,()=>{
    const c=document.getElementById("c-"+ID);
    c.addEventListener("mousedown",e=>{e.preventDefault();startRoll();});
    c.addEventListener("touchstart",e=>{e.preventDefault();startRoll();},{passive:false});
    RB(ID,init);init();
  });
}

makeRoll("rda","Roll Out the Dough","grain",
  "Pin shows end-grain wood texture: concentric rings (fixed) + radial medullary rays (rotate). Natural irregularity makes rotation clearly visible. Clockwise going right, counter-clockwise going left.");

</script>
